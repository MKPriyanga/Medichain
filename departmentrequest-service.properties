spring.application.name=departmentrequest-service
server.port=8084
 
spring.datasource.url=jdbc:mysql://localhost:3306/medichain_request_db
spring.datasource.username=root
spring.datasource.password=root@123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
 
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
 
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
 
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
 
server.error.include-message=always
server.error.include-stacktrace=always
 
# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.departmentServiceCB.register-health-indicator=true
resilience4j.circuitbreaker.instances.departmentServiceCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.departmentServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.departmentServiceCB.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.departmentServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.departmentServiceCB.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.departmentServiceCB.record-exceptions=java.lang.Exception
 
eureka.client.registry-fetch-interval-seconds=5
ribbon.ServerListRefreshInterval=2000
spring.cloud.loadbalancer.cache.ttl=10s
 
eureka.client.registry-fetch-interval-seconds=5
spring.cloud.loadbalancer.cache.ttl=5s
spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true

eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
 
