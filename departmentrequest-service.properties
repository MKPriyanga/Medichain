spring.application.name=departmentrequest-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/medichain_request_db
spring.datasource.username=root
spring.datasource.password=root@123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.client.registry-fetch-interval-seconds=5
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

server.error.include-message=always
server.error.include-stacktrace=always

# Feign + Circuit Breaker
feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.department-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.department-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.department-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.department-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.department-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.instances.department-service.timeout-duration=10s

resilience4j.retry.instances.department-service.max-attempts=3
resilience4j.retry.instances.department-service.wait-duration=1s

resilience4j.retry.instances.product-supplier-service.max-attempts=3
resilience4j.retry.instances.product-supplier-service.wait-duration=1s
# Load Balancer
spring.cloud.loadbalancer.cache.ttl=5s
spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.retry.max-retries-on-same-service-instance=2
spring.cloud.loadbalancer.retry.max-retries-on-next-service-instance=1
